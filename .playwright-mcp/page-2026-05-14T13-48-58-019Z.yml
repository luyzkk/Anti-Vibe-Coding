                - heading "Parity" [level=3] [ref=e136]
              - paragraph [ref=e137]: Whatever the user can do through the UI, the agent should be able to achieve through tools.
              - paragraph [ref=e138]: This is the foundational principle. Without it, nothing else matters. Ensure the agent has tools that can accomplish anything the UI can do.
              - paragraph [ref=e140]:
                - strong [ref=e141]: "The test:"
                - text: Pick any UI action. Can the agent accomplish it?
            - generic [ref=e142]:
              - generic [ref=e143]:
                - generic [ref=e144]: "2"
                - heading "Granularity" [level=3] [ref=e145]
              - paragraph [ref=e146]: Tools should be atomic primitives. Features are outcomes achieved by an agent operating in a loop.
              - paragraph [ref=e147]: A tool is a primitive capability. A feature is an outcome described in a prompt, achieved by an agent with tools, operating in a loop until the outcome is reached.
              - paragraph [ref=e149]:
                - strong [ref=e150]: "The test:"
                - text: To change behavior, do you edit prompts or refactor code?
            - generic [ref=e151]:
              - generic [ref=e152]:
                - generic [ref=e153]: "3"
                - heading "Composability" [level=3] [ref=e154]
              - paragraph [ref=e155]: With atomic tools and parity, you can create new features just by writing new prompts.
              - paragraph [ref=e156]: "Want a \"weekly review\" feature? That's just a prompt:"
              - code [ref=e158]: "\"Review files modified this week. Summarize key changes. Based on incomplete items and approaching deadlines, suggest three priorities for next week.\""
              - paragraph [ref=e159]:
                - text: The agent uses
                - code [ref=e160]: list_files
                - text: ","
                - code [ref=e161]: read_file
                - text: ", and its judgment. You described an outcome; the agent loops until it's achieved."
            - generic [ref=e162]:
              - generic [ref=e163]:
                - generic [ref=e164]: "4"
                - heading "Emergent capability" [level=3] [ref=e165]
              - paragraph [ref=e166]: The agent can accomplish things you didn't explicitly design for.
              - generic [ref=e167]:
                - paragraph [ref=e168]: "The flywheel:"
                - generic [ref=e169]:
                  - paragraph [ref=e170]: 1. Build with atomic tools and parity
                  - paragraph [ref=e171]: 2. Users ask for things you didn't anticipate
                  - paragraph [ref=e172]: 3. Agent composes tools to accomplish them (or fails, revealing a gap)
                  - paragraph [ref=e173]: 4. You observe patterns in what's being requested
                  - paragraph [ref=e174]: 5. Add domain tools or prompts to make common patterns efficient
                  - paragraph [ref=e175]: 6. Repeat
              - paragraph [ref=e177]:
