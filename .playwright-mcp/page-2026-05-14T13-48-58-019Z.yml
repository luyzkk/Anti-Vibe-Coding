            - generic [ref=e243]:
              - heading "Granularity" [level=3] [ref=e244]
              - paragraph [ref=e245]: "The key shift: The agent is pursuing an outcome with judgment, not executing a choreographed sequence. It can encounter unexpected cases, adjust its approach, or ask clarifying questions—the loop continues until the outcome is achieved."
              - paragraph [ref=e246]: The more atomic your tools, the more flexibly the agent can use them. If you bundle decision logic into tools, you've moved judgment back into code.
            - generic [ref=e247]:
              - heading "Composability" [level=3] [ref=e248]
              - paragraph [ref=e249]: This works for developers and users. You can ship new features by adding prompts. Users can customize behavior by modifying prompts or creating their own.
              - paragraph [ref=e250]:
                - strong [ref=e251]: "The constraint:"
                - text: this only works if tools are atomic enough to be composed in ways you didn't anticipate, and if the agent has parity with users. If tools encode too much logic, composition breaks down.
            - generic [ref=e252]:
              - heading "Emergent Capability" [level=3] [ref=e253]
              - paragraph [ref=e254]: "Example: \"Cross-reference my meeting notes with my task list and tell me what I've committed to but haven't scheduled.\" You didn't build a commitment tracker, but if the agent can read notes and tasks, it can accomplish this."
              - paragraph [ref=e255]:
                - text: This reveals
                - strong [ref=e256]: latent demand
                - text: . Instead of guessing what features users want, you observe what they're asking the agent to do. When patterns emerge, you can optimize them with domain-specific tools or dedicated prompts. But you didn't have to anticipate them—you discovered them.
              - paragraph [ref=e257]: This changes how you build products. You're not trying to imagine every feature upfront. You're creating a capable foundation and learning from what emerges.
            - generic [ref=e258]:
              - heading "Improvement over time" [level=3] [ref=e259]
              - paragraph [ref=e260]:
                - strong [ref=e261]: "Accumulated context:"
                - text: The agent maintains state across sessions—what exists, what the user has done, and what worked.
              - paragraph [ref=e262]:
                - strong [ref=e263]: "Prompt refinement at multiple levels:"
                - text: developer-level updates, user-level customization, and (advanced) agent-level adjustments based on feedback.
              - paragraph [ref=e264]:
                - strong [ref=e265]: "Self-modification (advanced):"
                - text: Agents that edit their own prompts or code require safety rails—approval gates, checkpoints, rollback paths, and health checks.
              - paragraph [ref=e266]: The mechanisms are still being discovered. Context and prompt refinement are proven; self-modification is emerging.
