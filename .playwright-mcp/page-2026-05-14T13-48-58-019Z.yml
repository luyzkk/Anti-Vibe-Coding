        - generic [ref=e108]:
          - heading "Why now" [level=2] [ref=e110]
          - generic [ref=e111]:
            - paragraph [ref=e112]: Software agents work reliably now. Claude Code demonstrated that a large language model (LLM) with access to bash and file tools, operating in a loop until an objective is achieved, can accomplish complex multi-step tasks autonomously.
            - paragraph [ref=e113]: "The surprising discovery: A really good coding agent is actually a really good general-purpose agent. The same architecture that lets Claude Code refactor a codebase can let an agent organize your files, manage your reading list, or automate your workflows."
            - paragraph [ref=e114]: The Claude Code software development kit (SDK) makes this accessible. You can build applications where features aren't code you write—they're outcomes you describe, achieved by an agent with tools, operating in a loop until the outcome is reached.
            - paragraph [ref=e115]: "This opens up a new field: software that works the way Claude Code works, applied to categories far beyond coding."
        - generic [ref=e119]:
          - generic [ref=e120]:
            - heading "The Only Subscription You Need to Stay at the Edge of AI" [level=3] [ref=e121]
