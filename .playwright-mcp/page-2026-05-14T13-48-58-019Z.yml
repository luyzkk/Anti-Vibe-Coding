              - heading "Parity" [level=3] [ref=e207]
              - paragraph [ref=e208]: "Imagine a notes app with a beautiful interface for creating, organizing, and tagging notes. A user asks: \"Create a note summarizing my meeting and tag it as urgent.\" If the UI can do it but the agent can't, the agent is stuck."
              - paragraph [ref=e209]:
                - strong [ref=e210]: "The fix:"
                - text: Ensure the agent has tools (or combinations of tools) that can accomplish anything the UI can do. This isn't about a one-to-one mapping of UI buttons to tools—it's about achieving the same outcomes.
              - paragraph [ref=e211]:
                - strong [ref=e212]: "The discipline:"
                - text: "When adding any UI capability, ask: Can the agent achieve this outcome? If not, add the necessary tools or primitives."
