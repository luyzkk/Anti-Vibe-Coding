name: Harness Validation

on:
  push:
    branches: [main]
  pull_request:

# Third-party actions pinned to commit SHAs (supply-chain hardening).
# When bumping, update SHA + trailing version comment together. Dependabot
# with `pinning: digest` can automate this — see .github/dependabot.yml when added.

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@f4d14e03ff726c06358e5557344e1da148b56cf7 # v1
      - run: bun install
      - run: bun run harness:validate
      - run: bun run compound:check
