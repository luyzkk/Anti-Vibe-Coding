name: Test Plugin Installation

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Third-party actions pinned to commit SHAs (supply-chain hardening).
# When bumping, update SHA + trailing version comment together.

jobs:
  validate-structure:
    name: Validate plugin structure
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@f4d14e03ff726c06358e5557344e1da148b56cf7 # v1
      - run: bun install
      - run: bun run harness:validate
      - name: Verify plugin.json exists
        run: test -f .claude-plugin/plugin.json && echo ".claude-plugin/plugin.json OK"

  validate-manifest:
    name: Validate plugin manifest
    needs: validate-structure
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@f4d14e03ff726c06358e5557344e1da148b56cf7 # v1
      - run: bun install
      - name: Check plugin-manifest.json
        run: test -f plugin-manifest.json && echo "plugin-manifest.json OK"

  validate-tests:
    name: Validate tests and types
    needs: validate-manifest
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@f4d14e03ff726c06358e5557344e1da148b56cf7 # v1
      - run: bun install
      - run: bun run test
      - run: bun run typecheck
